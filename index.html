<!DOCTYPE html>

    <div class="content">
      <h1 style="font-size: 400%; font-family: Bebas Neue, sans-serif">
        iron better than challenger
      </h1>
      <div class="gallery">
        <div class="image-container" onclick="openProfile('cuukey')">
          <img src="/images/Jerseys/CuukeyJersey.png" alt="Profil 1" />
        </div>
        <div class="image-container" onclick="openProfile('chibex')">
          <img src="/images/Jerseys/ChibexJersey.png" alt="Profil 2" />
        </div>
        <div class="image-container" onclick="openProfile('alberto')">
          <img src="/images/Jerseys/AlbertoJersey.png" alt="Profil 3" />
        </div>
        <div class="image-container" onclick="openProfile('äsöp')">
          <img src="/images/Jerseys/AsopJersey.png" alt="Profil 4" />
        </div>
        <div class="image-container" onclick="openProfile('psychovini')">
          <img src="/images/Jerseys/psychoviniJersey.png" alt="Profil 5" />
        </div>
        <div class="image-container" onclick="openProfile('kingthai2')">
          <img src="/images/Jerseys/Kingthai2Jersey.png" alt="Profil 6" />
        </div>
        <div class="image-container" onclick="openProfile('lyrienthena')">
          <img src="/images/Jerseys/LyrienthenaJersey.png" alt="Profil 7" />
        </div>
        <div class="image-container" onclick="openProfile('kayo')">
          <img src="/images/Jerseys/KaYoJersey.png" alt="Profil 8" />
        </div>
        <div class="image-container" onclick="openProfile('yannick')">
          <img src="/images/Jerseys/YannickJersey.png" alt="Profil 9" />
        </div>
      </div>

      <div id="profile-detail" class="profile-detail">
        <span style="font-size: 150%;"  class="close" onclick="closeProfile('profile')">&times;</span>

        <p id="player-name" class="profile-detail-playername"></p>
        <p id="player-text" class="profile-detail-text"></p>
        <p id="player-roles" class="profile-detail-roles"></p>

        <div id="player-socials" class="profile-detail-socials-grid-container">
          <a
            id="player-socials-youtube"
            class="profile-detail-socials-grid-item youtube"
            title="Youtube"
            target="_blank"
          >
            <img id="youtube-img" style="width: 120%" />
          </a>
          <a
            id="player-socials-instagram"
            class="profile-detail-socials-grid-item instagram"
            title="Instagram"
            target="_blank"
          >
            <img id="instagram-img" style="width: 120%" />
          </a>
          <a
            id="player-socials-twitter"
            class="profile-detail-socials-grid-item twitter"
            title="Twitter"
            target="_blank"
          >
            <img id="twitter-img" style="width: 120%" />
          </a>
          <a
            id="player-socials-twitch"
            class="profile-detail-socials-grid-item twitch"
            title="Twitch"
            target="_blank"
          >
            <img id="twitch-img" style="width: 120%" />
          </a>
          <a
            id="player-socials-tiktok"
            class="profile-detail-socials-grid-item tiktok"
            title="Tiktok"
            target="_blank"
          >
            <img id="tiktok-img" style="width: 120%" />
          </a>
        </div>

        <a
          id="player-riotname"
          class="profile-detail-riotname riotlink"
          title="op.gg Profil"
        ></a>
      </div>



      <h1 style="font-size: 400%; font-family: Bebas Neue, sans-serif;">spielplan</h1>
        
      <table class="gameplan-container"></table>
