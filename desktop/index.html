        </div>
        <script>
            const images= [
                "/media/Jersey/Jersey1.png",
                "/media/Jersey/Jersey2.png",
                "/media/Jersey/Jersey3.png",
                "/media/Jersey/Jersey4.png"
            ];
            let currentIndex = 0;
            
            function changeImage(){
                currentIndex = (currentIndex + 1) % images.length;
                document.getElementById("jerseyImage").src = images[currentIndex];
            }

            setInterval(changeImage,10000);
            console.log("Bildwechsel!");
        </script>
