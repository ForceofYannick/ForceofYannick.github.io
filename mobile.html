<!-- AKTUELLER SPLIT -->
<h3 class="section-header">Aktueller Split</h3>

<div class="split-results" style="border: 1px solid black;">
    <h1 class="split-header">Prime League Summer Split '24</h1>
    <table>
        <tr>
            <th style="border-left: none; border-top: none;">IBTC</th>

            <td style="border-left: none; border-top: none; border-bottom: none;" id="ibtc_div">Div -</td>
            <td style="border-top: none; border-bottom: none;" id="ibty_div">Div -</td>

        <tr>
            <td style="border-left: none; border-bottom: none; border-top: none" id="ibtc_rang">Rang -</td>
            <td style="border-bottom: none; border-top: none" id="ibty_rang">Rang -</td>

            <td style="border-bottom: none; border-top: none" id="ibta_rang">Rang -</td>

        </tr>
    </table>
</div>




<!-- LIVESTREAM -->
<h3 class="section-header">Casting Livestream</h3>

<div class="twitch">

    <div id="twitch-embed" style="border-radius: 16px;overflow: hidden;"></div>
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script type="text/javascript">
        
    let width = window.innerWidth * 0.98; // 98% der Viewport-Breite
    let height = Math.floor(width / 1.777777777); // Höhe im 16:9 Verhältnis, abgerundet

    new Twitch.Embed("twitch-embed", {
    width: width,
    height: height,
    layout: "video",
    autoplay: "false",
    channel: "ibt_challenger",
    parent: ["localhost"]
});
    </script>

</div>



<!-- JERSEY -->
<h3 class="section-header">Bock auf ein Jersey?</h3>

<div class="jersey">
    
        <a href="https://teams.spized.com/ibtc">
            <img id="jerseyImage" src="/media/Jersey/Jersey1.png"/>
        </a>
        
    <script>
        const images= [
            "/media/Jersey/Jersey1.png",
            "/media/Jersey/Jersey2.png",
            "/media/Jersey/Jersey3.png",
            "/media/Jersey/Jersey4.png"
        ];
        let currentIndex = 0;
        
        function changeImage(){
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById("jerseyImage").src = images[currentIndex];
        }

        setInterval(changeImage,10000);
        console.log("Bildwechsel!");
    </script>
</div>
